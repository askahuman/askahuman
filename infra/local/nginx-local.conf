# LOCAL E2E ONLY — a faithful copy of frontend/nginx.conf with ONE difference:
# the CSP connect-src is relaxed to also allow the kind relay at
# ws://127.0.0.1:8080 (the headless PWA E2E dials it over plain ws, which the
# prod-pinned `connect-src 'self' wss://ask-a-human.ai` blocks). This file is
# ConfigMap-mounted over /etc/nginx/conf.d/default.conf by infra/local ONLY; the
# prod image and infra/prod are untouched and keep the strict header verbatim.
# frontend/nginx.conf is the SOURCE OF TRUTH: re-sync this copy on any change
# there. Enforcement: scripts/e2e.sh diffs the two (comments stripped,
# connect-src masked) and fails the run on any other divergence. Static PWA
# server. nginx-unprivileged listens on 8080 as the non-root nginx user.

# Don't leak the nginx version in the Server header / error pages.
server_tokens off;

# Access-log format that OMITS the query string. Nothing secret should ride in a
# URL, but logging $request/$request_uri would persist any stray query args in
# plaintext logs. $uri is the normalized path only (no args), keeping anything
# sensitive out of the access log.
log_format noquery '$remote_addr - $remote_user [$time_local] '
                   '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                   '"-" "$http_user_agent"';

server {
    listen 8080;
    server_name _;

    # TLS terminates at the upstream load balancer; nginx only ever sees plain HTTP on :8080.
    # So an ABSOLUTE trailing-slash redirect (e.g. /app -> /app/) is built from
    # nginx's own scheme+port and leaks as "http://<host>:8080/app/" — which the
    # public has no route to, so the phone's request to `/app` times out and
    # the PWA never loads. Emit RELATIVE redirects ("/app/") so the browser
    # resolves them against the original https origin. port_in_redirect off is
    # belt-and-suspenders against the :8080 leak. ref. infra/prod/ingress.yaml.
    absolute_redirect off;
    port_in_redirect off;

    # Never log query strings (nothing secret should ride in a URL).
    access_log /dev/stdout noquery;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers. The PWA is the only key-holding party, so an XSS/clickjack
    # defeats E2E — these are load-bearing, not cosmetic.
    #
    # CSP is delivered TWICE on purpose and the browser enforces the intersection:
    #   1. Astro emits a <meta> CSP (see astro.config.mjs) whose script-src/style-src
    #      carry a per-build sha256 for every inline <script>/<style> it generates.
    #      That meta is the strict, build-synced script/style policy.
    #   2. The header below carries frame-ancestors 'none' — a <meta>-delivered CSP
    #      CANNOT enforce frame-ancestors per spec, so clickjacking protection must
    #      come from the header (X-Frame-Options is the legacy belt-and-suspenders).
    #      script-src/style-src here are 'unsafe-inline' so this header never blocks
    #      Astro's inline scripts; the meta's hashes are stricter and win the
    #      intersection (a hash source list disables 'unsafe-inline' in the meta).
    #
    # nginx `add_header` does NOT inherit into a location that defines its own
    # add_header, and every location below sets Cache-Control. So the full header
    # set is repeated in each served location. The `always` flag applies them to
    # error responses too. ponytail: if a 5th location is added, copy this block
    # into it (no native nginx header-group reuse without an external include file).
    #
    # LOCAL DELTA vs frontend/nginx.conf: connect-src additionally allows the kind
    # relay (ws://127.0.0.1:8080 / ws://localhost:8080) so the headless E2E browser
    # can join the room over plain ws. Everything else is identical to prod. The
    # <meta> CSP (astro.config.mjs) already carries `wss: ws:`, so the intersection
    # permits it once this header does too.
    set $sec_csp "default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; manifest-src 'self'; worker-src 'self'; connect-src 'self' wss://ask-a-human.ai ws://127.0.0.1:8080 ws://localhost:8080; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'";

    # SPA-ish fallback: unknown routes serve the shell (the PWA owns routing).
    # index.html must NOT be cached: it points at fingerprinted /_astro/ assets, so a stale
    # cached shell after a redeploy references deleted JS (404) → blank page. Revalidate always.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Content-Security-Policy $sec_csp always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # The service worker must never be cached, or clients get stuck on a stale SW.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Security-Policy $sec_csp always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy $sec_csp always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        try_files $uri =404;
    }

    # Fingerprinted assets are immutable -> cache hard.
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Content-Security-Policy $sec_csp always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        try_files $uri =404;
    }
}
