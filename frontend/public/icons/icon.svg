<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- dark glossy body (matches the app icon's black + neon look) -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3340"/>
      <stop offset="0.5" stop-color="#161b24"/>
      <stop offset="1" stop-color="#0b0d13"/>
    </linearGradient>
    <linearGradient id="bodyTopGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3c4658"/>
      <stop offset="1" stop-color="#1b212c"/>
    </linearGradient>
    <linearGradient id="sideSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.22" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="clipGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#39414f"/>
      <stop offset="1" stop-color="#11151c"/>
    </linearGradient>

    <!-- brand cyan -> green, diagonal across the screen -->
    <linearGradient id="brand" gradientUnits="userSpaceOnUse" x1="160" y1="196" x2="352" y2="284">
      <stop offset="0" stop-color="#60D0F4"/>
      <stop offset="1" stop-color="#8CF174"/>
    </linearGradient>
    <linearGradient id="brandV" gradientUnits="userSpaceOnUse" x1="168" y1="60" x2="168" y2="120">
      <stop offset="0" stop-color="#8CF174"/>
      <stop offset="1" stop-color="#60D0F4"/>
    </linearGradient>

    <!-- dark LCD background -->
    <linearGradient id="lcdBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1118"/>
      <stop offset="1" stop-color="#05080c"/>
    </linearGradient>
    <radialGradient id="screenGlow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#79e6b8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#79e6b8" stop-opacity="0"/>
    </radialGradient>

    <!-- decision buttons -->
    <radialGradient id="btnGreen" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#b6ff9a"/>
      <stop offset="0.5" stop-color="#5fd04a"/>
      <stop offset="1" stop-color="#2c8a1f"/>
    </radialGradient>
    <radialGradient id="btnRed" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#ff9a9a"/>
      <stop offset="0.5" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#a51d1d"/>
    </radialGradient>
    <radialGradient id="btnCyan" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#b6ecff"/>
      <stop offset="0.5" stop-color="#3fb6e8"/>
      <stop offset="1" stop-color="#1571a8"/>
    </radialGradient>

    <radialGradient id="antTip" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#d6ffe6"/>
      <stop offset="0.55" stop-color="#7fe6a0"/>
      <stop offset="1" stop-color="#37b6c8"/>
    </radialGradient>
    <radialGradient id="reqLed" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#ff8a8a"/>
      <stop offset="0.5" stop-color="#ef3b3b"/>
      <stop offset="1" stop-color="#b01616"/>
    </radialGradient>
    <radialGradient id="reqGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff4d4d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff4d4d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dropShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#000000" stop-opacity="0.33"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="#08090c"/>

  <!-- ground shadow -->
  <ellipse cx="256" cy="470" rx="150" ry="24" fill="url(#dropShadow)"/>

  <!-- signal waves off the antenna (an incoming page) -->
  <g fill="none" stroke="url(#brandV)" stroke-linecap="round">
    <path d="M150 84 Q168 72 186 84" stroke-width="5" opacity="0.95"/>
    <path d="M142 72 Q168 52 194 72" stroke-width="5" opacity="0.6"/>
  </g>

  <!-- belt clip behind body -->
  <g>
    <rect x="232" y="78" width="48" height="50" rx="12" fill="url(#clipGrad)"/>
    <rect x="240" y="58" width="32" height="42" rx="15" fill="none" stroke="url(#clipGrad)" stroke-width="14"/>
    <rect x="241" y="60" width="30" height="12" rx="6" fill="#5a667a" opacity="0.7"/>
  </g>

  <!-- antenna nub on top -->
  <g>
    <rect x="162" y="96" width="12" height="34" rx="6" fill="url(#clipGrad)"/>
    <circle cx="168" cy="96" r="13" fill="url(#antTip)"/>
    <circle cx="164" cy="92" r="4" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- main body -->
  <rect x="96" y="110" width="320" height="320" rx="46" fill="url(#bodyGrad)"/>
  <path d="M96 156 a46 46 0 0 1 46 -46 h228 a46 46 0 0 1 46 46 v40 h-320 z" fill="url(#bodyTopGrad)" opacity="0.7"/>
  <rect x="96" y="110" width="320" height="320" rx="46" fill="url(#sideSheen)"/>
  <rect x="96.5" y="110.5" width="319" height="319" rx="45.5" fill="none" stroke="#05070b" stroke-width="3" opacity="0.7"/>
  <rect x="100" y="114" width="312" height="312" rx="43" fill="none" stroke="#5a6678" stroke-width="1.5" opacity="0.25"/>
  <!-- top gloss strip -->
  <rect x="122" y="126" width="268" height="20" rx="10" fill="#ffffff" opacity="0.16"/>

  <!-- waiting-request red LED (echoes the roster's pulsing red request dot) -->
  <circle cx="384" cy="150" r="15" fill="url(#reqGlow)"/>
  <circle cx="384" cy="150" r="7" fill="url(#reqLed)"/>
  <circle cx="382" cy="148" r="2.4" fill="#ffd2d2" opacity="0.9"/>

  <!-- screen bezel -->
  <rect x="132" y="170" width="248" height="138" rx="20" fill="#080b11"/>
  <rect x="132.5" y="170.5" width="247" height="137" rx="19.5" fill="none" stroke="#04060a" stroke-width="3"/>

  <!-- LCD -->
  <rect x="150" y="186" width="212" height="106" rx="10" fill="url(#lcdBg)"/>
  <rect x="150" y="186" width="212" height="106" rx="10" fill="url(#screenGlow)"/>
  <ellipse cx="252" cy="236" rx="104" ry="42" fill="url(#brand)" opacity="0.12"/>
  <rect x="150.5" y="186.5" width="211" height="105" rx="9.5" fill="none" stroke="url(#brand)" stroke-width="2" opacity="0.85"/>
  <!-- screen top sheen -->
  <rect x="156" y="190" width="200" height="20" rx="9" fill="#ffffff" opacity="0.05"/>

  <!-- ===== LCD content: the agent's request = robot + "?" ===== -->
  <!-- robot (the autonomous agent) -->
  <g>
    <!-- antenna -->
    <line x1="206" y1="214" x2="206" y2="200" stroke="url(#brand)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="206" cy="196" r="5" fill="url(#brand)"/>
    <!-- head -->
    <rect x="172" y="214" width="68" height="54" rx="16" fill="#0a0f15" stroke="url(#brand)" stroke-width="6"/>
    <!-- eyes -->
    <rect x="190" y="232" width="9" height="18" rx="4.5" fill="url(#brand)"/>
    <rect x="213" y="232" width="9" height="18" rx="4.5" fill="url(#brand)"/>
  </g>

  <!-- pixel "?" = the difficult decision (5x7 grid, cell=9, origin 288,206) -->
  <g fill="url(#brand)">
    <rect x="297" y="206" width="27" height="9" rx="2"/>      <!-- row0 cols1-3 -->
    <rect x="288" y="215" width="9" height="9" rx="2"/>       <!-- row1 col0 -->
    <rect x="324" y="215" width="9" height="9" rx="2"/>       <!-- row1 col4 -->
    <rect x="324" y="224" width="9" height="9" rx="2"/>       <!-- row2 col4 -->
    <rect x="306" y="233" width="18" height="9" rx="2"/>      <!-- row3 cols2-3 -->
    <rect x="306" y="242" width="9" height="9" rx="2"/>       <!-- row4 col2 -->
    <rect x="306" y="260" width="9" height="9" rx="2"/>       <!-- row6 col2 (dot) -->
  </g>

  <!-- subtle LCD scanlines -->
  <g stroke="#7fe6c0" stroke-width="1" opacity="0.10">
    <line x1="150" y1="222" x2="362" y2="222"/>
    <line x1="150" y1="248" x2="362" y2="248"/>
    <line x1="150" y1="274" x2="362" y2="274"/>
  </g>

  <!-- ===== decision buttons: the human's call ===== -->
  <g>
    <!-- approve (green check) -->
    <circle cx="170" cy="356" r="26" fill="#05070b"/>
    <circle cx="170" cy="354" r="24" fill="url(#btnGreen)"/>
    <circle cx="162" cy="346" r="7" fill="#ffffff" opacity="0.5"/>
    <path d="M159 355 l7 8 l14 -17" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- deny (red cross) -->
    <circle cx="256" cy="356" r="26" fill="#05070b"/>
    <circle cx="256" cy="354" r="24" fill="url(#btnRed)"/>
    <circle cx="248" cy="346" r="7" fill="#ffffff" opacity="0.5"/>
    <path d="M247 345 l18 18 M265 345 l-18 18" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>

    <!-- ask back (cyan question) -->
    <circle cx="342" cy="356" r="26" fill="#05070b"/>
    <circle cx="342" cy="354" r="24" fill="url(#btnCyan)"/>
    <circle cx="334" cy="346" r="7" fill="#ffffff" opacity="0.5"/>
    <path d="M334 349 C334 342 351 342 350 350 C349 356 342 354 342 360" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <circle cx="342" cy="368" r="3" fill="#ffffff"/>
  </g>

  <!-- speaker grille dots -->
  <g fill="#2a3344" opacity="0.95">
    <circle cx="150" cy="404" r="5"/>
    <circle cx="170" cy="404" r="5"/>
    <circle cx="190" cy="404" r="5"/>
    <circle cx="210" cy="404" r="5"/>
    <circle cx="302" cy="404" r="5"/>
    <circle cx="322" cy="404" r="5"/>
    <circle cx="342" cy="404" r="5"/>
    <circle cx="362" cy="404" r="5"/>
  </g>

  <!-- bottom highlight -->
  <rect x="120" y="412" width="272" height="10" rx="5" fill="#ffffff" opacity="0.06"/>
</svg>
