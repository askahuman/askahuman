# Ongoing guard: fail the build if a secret/credential is ever committed.
# Complements the one-time scrub done before going public, plus GitHub's native
# secret-scanning + push-protection (enable both in repo Settings → Security).
# gitleaks-action is free on public repositories.
name: secret-scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
