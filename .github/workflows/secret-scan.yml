# Ongoing guard: fail the build if a secret/credential is ever committed.
# Complements the one-time scrub done before going public, plus GitHub's native
# secret-scanning + push-protection (enable both in repo Settings → Security).
#
# We run the gitleaks OSS binary directly (MIT, free) instead of gitleaks-action,
# which now requires a paid GITLEAKS_LICENSE for organization-owned repos.
name: secret-scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (OSS binary — no org license needed)
        run: |
          VER=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks git . --config .gitleaks.toml --redact --exit-code 1
